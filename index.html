<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Album Foto Jena</title>
    <link rel="icon" type="image/x-icon" href="fav.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap');
        body { font-family: 'Quicksand', sans-serif; }
        .lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(37, 37, 37, 0.774);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .album-card { transition: transform 0.3s ease; }
        .album-card:hover { transform: scale(1.05) rotate(2deg); }
    </style>
</head>
<body class="bg-sky-50 min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="bg-white shadow-sm py-4 px-6 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <span class="text-2xl font-bold text-rose-500">🧸 Jennaira Nur Nazila</span>
            <div class="space-x-4 text-sky-700 font-bold">
                <a href="upload.html"><button class="px-4 py-2 rounded-full shadow-md text-rose-500 hover:text-rose-700 font-bold border border-rose-100">+ Foto Baru</button></a>
            </div>
        </div>
    </nav>

    <!-- Header -->
    <header class="text-center py-12 px-6">
        <h1 class="text-4xl font-bold text-rose-500 mb-2">Album Foto Jena ✨</h1>
        <p class="text-sky-600 italic">"Menyimpan setiap senyum dan tawa dalam bingkai kenangan"</p>
    </header>

    <main class="flex-grow max-w-4xl w-full mx-auto p-6">
        <!-- Halaman Daftar Folder -->
        <div id="folderView" class="grid grid-cols-2 md:grid-cols-4 gap-6">
            <div id="loadingFolders" class="col-span-full text-center py-10 text-sky-700 font-bold">Sedang membuka album...</div>
        </div>

        <!-- Halaman Galeri Gambar -->
        <div id="galleryView" class="hidden">
            <button onclick="showFolders()" class="mb-6 flex items-center bg-white px-4 py-2 rounded-full shadow-md text-rose-500 hover:text-rose-700 font-bold border border-rose-100">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 mr-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Kembali ke Daftar Album
            </button>
            <h2 id="currentFolderName" class="text-3xl font-bold mb-6 text-sky-800 text-center"></h2>
            <div id="imageGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white py-6 mt-10 text-center text-sky-700 border-t border-sky-100">
        <p>© 2026 Jennaira Nur Nazila. Dibuat oleh Iwan ❤️ Aisyah</p>
    </footer>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <img id="lightboxImg" src="" class="max-w-full max-h-full rounded-2xl shadow-2xl border-4 border-white">
        <button onclick="closeLightbox()" class="absolute top-5 right-5 text-rose-500 bg-white p-3 rounded-full shadow-lg hover:bg-rose-50 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzSDUg6MQIsG61HfBo_PiB4gWAinrg3HNRpCnVEFY50cDZ7BKMMQqRccjKlvIZlf_Uz6A/exec"; 
        let allData = [];

        async function fetchData() {
            const statusDiv = document.getElementById('loadingFolders');
            try {
                const response = await fetch(GAS_URL + "?action=getFolders");
                if (!response.ok) throw new Error("Gagal mengambil data");
                let fetchData = await response.json();
                allData = fetchData.reverse();
                renderFolders();
            } catch (e) {
                statusDiv.innerHTML = `<span class="text-rose-500 font-bold">Ups, gagal memuat: ${e.message}</span>`;
            }
        }

        function renderFolders() {
            const folderView = document.getElementById('folderView');
            const folders = [...new Set(allData.map(row => row[1] || "Tanpa Nama Folder"))];
            folderView.innerHTML = folders.map(folder => `
                <div onclick="showGallery('${folder}')" class="album-card bg-white p-4 rounded-3xl shadow-lg border-b-4 border-sky-200 cursor-pointer text-center">
                    <div class="bg-rose-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-3 text-rose-500 text-3xl">🧸</div>
                    <p class="font-bold text-sky-900 truncate">${folder}</p>
                </div>
            `).join('');
        }

        function showGallery(folderName) {
            document.getElementById('folderView').classList.add('hidden');
            document.getElementById('galleryView').classList.remove('hidden');
            document.getElementById('currentFolderName').textContent = `Album: ${folderName}`;
            
            const images = allData.filter(row => row[1] === folderName);
            document.getElementById('imageGrid').innerHTML = images.map(img => `
                <div class="bg-white p-2 rounded-2xl shadow hover:shadow-xl cursor-pointer transition-all hover:scale-105 border-4 border-white" onclick="openLightbox('${img[3]}')">
                    <img src="${img[3]}" class="w-full h-40 object-cover rounded-xl" alt="Foto Anak">
                </div>
            `).join('');
        }

        function openLightbox(src) {
            document.getElementById('lightboxImg').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }

        function showFolders() {
            document.getElementById('folderView').classList.remove('hidden');
            document.getElementById('galleryView').classList.add('hidden');
        }

        fetchData();
    </script>
</body>
</html>
